[build]
  publish = "exampleSite/public"
  command = "cd exampleSite && hugo --gc --minify --themesDir ../.."

[build.environment]
  # Fixes the "Node.js 18" warning — Agent Runners want 22+
  NODE_VERSION = "22"
  # Extended Hugo (required for SCSS); modern stable release
  HUGO_VERSION = "0.128.0"
  HUGO_THEME = "repo"
  HUGO_BASEURL = "/"
  # Don't let an aborted local build's lock file break CI
  HUGO_ENABLEGITINFO = "false"

# Production build (default/production branch)
[context.production.environment]
  HUGO_ENV = "production"

# Deploy previews and branch deploys can drop the strict flags if needed
[context.deploy-preview.environment]
  HUGO_ENV = "development"
