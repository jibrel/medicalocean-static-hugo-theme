<nav class="nav" id="nav">
  <div class="nav-container">
    <a href="{{ .Site.Home.RelPermalink }}" class="nav-logo">
      <img src="/images/logo-icon.png" alt="{{ .Site.Title }}" class="nav-logo-img">
      <span class="nav-logo-text">{{ .Site.Title }}</span>
    </a>
    <ul class="nav-menu" id="nav-menu">
      {{ $currentPage := . }}
      {{ range .Site.Menus.main }}
      {{ $active := or ($currentPage.IsMenuCurrent "main" .) ($currentPage.HasMenuCurrent "main" .) }}
      <li>
        <a href="{{ .URL }}" class="nav-link {{ if eq .Identifier "contact" }}nav-cta{{ end }} {{ if $active }}active{{ end }}">
          {{ .Name }}
        </a>
      </li>
      {{ end }}
    </ul>
    <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>
