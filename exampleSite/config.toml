baseURL = "/"
languageCode = "en-us"
theme = "medicalocean-static-hugo-theme"
themesDir = "../.."
title = "Medical Ocean"
paginate = 10
pygmentsCodeFences = true
pygmentsCodefencesGuessSyntax = true
pygmentsUseClasses = true

[module]
  [module.hugoVersion]
    extended = true
    min = "0.55.0"

[params]
  google_analytics_id = ""
  twitter_handle = "@MedicalOceanio"
  youtube_handle = "@MedicalOcean2023"
  linkedin_handle = "https://www.linkedin.com/company/medical-ocean/"

  # Company Info
  companyName = "Medical Ocean LTD"
  companyNumber = "14943900"
  companyEmail = "admin@medicalocean.co"
  companyPhone = "0787 226 979"
  companyAddress = "86-90 Paul Street, London EC2A 4NE"
  companyTagline = "Simple software, connected healthcare."

  showAuthorOnHomepage = true
  showAuthorOnPosts = true
  showIntroContentOnHomepage = true
  showPostsOnHomepage = false
  usePaginationOnHomepage = false
  limitPostsOnHomepage = 3
  sortPostsByDateOldestFirst = false
  addDot = true
  addFrame = true

  # Brand Colors - Ocean Blue Palette
  highlightColor = '#1E88E5'
  baseColor = "#ffffff"
  baseOffsetColor = "#F8FAFC"
  headingColor = "#0F172A"
  textColor = "#475569"
  dotColor = "#1E88E5"

  enableGoogleFonts = true
  googleFontsUrl = "https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
  fontFamilyHeading = "Poppins"
  fontFamilyParagraph = "Poppins"
  fontFamilyMonospace = "monospace"

# markdown config settings
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      hardWraps = false
      unsafe = true
      xhtml = false

[menu]
  [[menu.main]]
    identifier = 'home'
    name = 'Home'
    url = '/'
    weight = 1
  [[menu.main]]
    name = "Products"
    identifier = "products"
    weight = 2
    url = "/#products"
  [[menu.main]]
    name = "Features"
    identifier = "features"
    weight = 3
    url = "/#features"
  [[menu.main]]
    name = "About"
    identifier = "about"
    weight = 4
    url = "/about/"
  [[menu.main]]
    name = "Blog"
    identifier = "blog"
    weight = 5
    url = "/posts/"
  [[menu.main]]
    name = "Contact"
    identifier = "contact"
    weight = 6
    url = "/#contact"
